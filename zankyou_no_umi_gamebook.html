<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>残響の海 ― 軌道清掃船〈ヒバリ〉航海録</title>
<style>
  :root{
    --bg:#0B0F1E;          /* 深海の夜 */
    --panel:#141A30;       /* 薄明 */
    --panel2:#1A2140;
    --ink:#D9DDE8;         /* 星霜 */
    --ink-dim:#8B93AC;
    --gold:#D5A45E;        /* 残響の金 */
    --gold-dim:#8A6F47;
    --signal:#7EC4BC;      /* 信号の青緑 */
    --rust:#C2604E;        /* 警告の錆 */
    --line:#2A3354;
    --serif:"Hiragino Mincho ProN","Yu Mincho","BIZ UDMincho","Noto Serif JP","Noto Serif CJK JP",serif;
    --sans:"Hiragino Kaku Gothic ProN","Yu Gothic Medium","Yu Gothic",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:16px}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--serif);
    line-height:1.95;min-height:100vh;overflow-x:hidden;
  }
  /* 星野 */
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.8;
    background-image:
      radial-gradient(1px 1px at 12% 22%, #cfd6ea 60%, transparent 61%),
      radial-gradient(1px 1px at 78% 14%, #9aa6c8 60%, transparent 61%),
      radial-gradient(1.5px 1.5px at 55% 68%, #e8ddc0 60%, transparent 61%),
      radial-gradient(1px 1px at 30% 84%, #cfd6ea 60%, transparent 61%),
      radial-gradient(1px 1px at 90% 52%, #9aa6c8 60%, transparent 61%),
      radial-gradient(1.2px 1.2px at 66% 33%, #cfd6ea 60%, transparent 61%),
      radial-gradient(1px 1px at 8% 60%, #7f8db0 60%, transparent 61%),
      radial-gradient(1px 1px at 42% 8%, #cfd6ea 60%, transparent 61%),
      radial-gradient(1.4px 1.4px at 84% 82%, #e8ddc0 60%, transparent 61%),
      radial-gradient(1px 1px at 22% 44%, #7f8db0 60%, transparent 61%);
  }
  @media (prefers-reduced-motion: no-preference){
    .stars{animation:drift 240s linear infinite}
    @keyframes drift{from{background-position:0 0}to{background-position:-800px 300px}}
    .para{opacity:0;transform:translateY(8px);animation:rise .7s ease forwards}
    @keyframes rise{to{opacity:1;transform:none}}
  }
  .wrap{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:0 20px 96px}

  /* ヘッダー */
  header{display:flex;align-items:baseline;justify-content:space-between;gap:8px;
    padding:14px 2px 10px;border-bottom:1px solid var(--line);font-family:var(--sans)}
  .brand{font-family:var(--serif);letter-spacing:.35em;font-size:.95rem;color:var(--ink-dim);white-space:nowrap}
  nav{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
  nav button{background:none;border:1px solid var(--line);color:var(--ink-dim);
    font-family:var(--sans);font-size:.72rem;padding:4px 9px;border-radius:3px;cursor:pointer;letter-spacing:.08em}
  nav button:hover{border-color:var(--gold-dim);color:var(--gold)}
  nav button:disabled{opacity:.35;cursor:default}
  nav button:disabled:hover{border-color:var(--line);color:var(--ink-dim)}

  /* 受信機パネル */
  .receiver{display:flex;align-items:center;gap:16px;flex-wrap:wrap;
    margin:14px 0 26px;padding:10px 14px;background:var(--panel);
    border:1px solid var(--line);border-radius:4px;font-family:var(--sans)}
  .rx-block{display:flex;align-items:center;gap:8px}
  .rx-label{font-size:.68rem;letter-spacing:.22em;color:var(--ink-dim)}
  canvas#wave{display:block;background:#0d1226;border-radius:2px}
  .rx-num{font-size:.8rem;color:var(--signal);min-width:2.6em}
  .frag-dots{display:flex;gap:7px}
  .frag-dot{width:11px;height:11px;transform:rotate(45deg);border:1px solid var(--gold-dim);opacity:.45}
  .frag-dot.on{background:var(--gold);border-color:var(--gold);opacity:1;box-shadow:0 0 6px rgba(213,164,94,.5)}
  .rx-loc{margin-left:auto;font-size:.72rem;letter-spacing:.15em;color:var(--ink-dim)}

  /* 場面 */
  .scene{display:grid;grid-template-columns:64px 1fr;gap:22px;margin-bottom:34px}
  .scene-title{writing-mode:vertical-rl;text-orientation:mixed;
    border-left:1px solid var(--line);padding-left:14px;user-select:none}
  .scene-title .chap{font-size:.72rem;letter-spacing:.4em;color:var(--ink-dim);margin-left:10px}
  .scene-title .ttl{font-size:1.5rem;letter-spacing:.3em;color:var(--gold)}
  .scene-text p{margin-bottom:1.15em;font-size:1.02rem;text-align:justify}
  .para{animation-delay:calc(var(--i) * .12s)}

  /* 選択肢 */
  .choices{display:flex;flex-direction:column;gap:10px;margin-top:8px}
  .choice{display:flex;gap:12px;align-items:baseline;text-align:left;width:100%;
    background:var(--panel);border:1px solid var(--line);border-radius:4px;
    color:var(--ink);font-family:var(--serif);font-size:.98rem;line-height:1.7;
    padding:13px 16px;cursor:pointer;transition:border-color .15s,background .15s}
  .choice:hover{border-color:var(--gold);background:var(--panel2)}
  .choice:focus-visible{outline:2px solid var(--signal);outline-offset:2px}
  .choice .num{font-family:var(--sans);font-size:.72rem;color:var(--gold);letter-spacing:.1em;min-width:1.2em}
  .choice.locked{cursor:default;opacity:.55;border-style:dashed}
  .choice.locked:hover{border-color:var(--line);background:var(--panel)}
  .choice.locked .num{color:var(--ink-dim)}
  .locked-hint{display:block;font-size:.76rem;color:var(--rust);margin-top:4px;font-family:var(--sans);letter-spacing:.04em}

  /* 終幕 */
  .ending-card{margin-top:30px;padding:22px 20px;text-align:center;border:1px solid var(--gold-dim);
    border-radius:4px;background:linear-gradient(180deg,var(--panel),#10152b)}
  .ending-card.tone-true{border-color:var(--gold);box-shadow:0 0 24px rgba(213,164,94,.18)}
  .ending-card.tone-dark{border-color:var(--rust)}
  .ending-card.tone-warm{border-color:var(--gold-dim)}
  .ending-eyebrow{font-family:var(--sans);font-size:.68rem;letter-spacing:.4em;color:var(--ink-dim);margin-bottom:10px}
  .ending-name{font-size:1.25rem;letter-spacing:.25em;color:var(--gold);margin-bottom:16px}
  .ending-count{font-family:var(--sans);font-size:.75rem;color:var(--ink-dim);margin-bottom:18px}
  .ending-card .btnrow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .btn{background:none;border:1px solid var(--gold-dim);color:var(--gold);border-radius:3px;
    font-family:var(--sans);font-size:.8rem;letter-spacing:.12em;padding:9px 18px;cursor:pointer}
  .btn:hover{border-color:var(--gold);background:rgba(213,164,94,.08)}
  .btn.secondary{border-color:var(--line);color:var(--ink-dim)}
  .btn.secondary:hover{color:var(--ink);border-color:var(--ink-dim);background:none}

  /* タイトル画面 */
  .title-screen{display:grid;grid-template-columns:1fr auto;gap:30px;align-items:start;padding:48px 0 20px}
  .title-main{writing-mode:vertical-rl;text-orientation:mixed;justify-self:end;
    font-size:3.2rem;letter-spacing:.42em;color:var(--ink);
    border-right:2px solid var(--gold);padding-right:22px;min-height:320px}
  .title-main small{display:block;font-size:.9rem;letter-spacing:.34em;color:var(--gold);margin-right:14px;margin-top:8px}
  .title-body{max-width:400px}
  .title-body .lead{font-size:.95rem;color:var(--ink);margin-bottom:22px;text-align:justify}
  .howto{font-family:var(--sans);font-size:.78rem;color:var(--ink-dim);line-height:1.9;
    border:1px solid var(--line);border-radius:4px;padding:14px 16px;margin-bottom:24px}
  .howto li{list-style:none;padding-left:1em;text-indent:-1em;margin-bottom:4px}
  .howto li::before{content:"—";margin-right:.5em;color:var(--gold-dim)}
  .title-btns{display:flex;flex-direction:column;gap:10px;max-width:280px}

  /* モーダル */
  .modal-bg{position:fixed;inset:0;background:rgba(5,8,18,.82);z-index:10;display:none;
    align-items:flex-start;justify-content:center;padding:6vh 16px}
  .modal-bg.open{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:5px;
    max-width:560px;width:100%;max-height:82vh;overflow-y:auto;padding:22px 24px}
  .modal h2{font-size:1rem;letter-spacing:.3em;color:var(--gold);margin-bottom:16px;font-weight:normal}
  .modal .close-row{text-align:right;margin-top:18px}
  .gloss dt{color:var(--signal);font-size:.92rem;margin-top:14px;letter-spacing:.06em}
  .gloss dd{font-size:.86rem;color:var(--ink-dim);line-height:1.85;margin-top:2px}
  .achv{list-style:none}
  .achv li{display:flex;gap:12px;align-items:baseline;padding:9px 2px;border-bottom:1px dashed var(--line);font-size:.9rem}
  .achv .mark{font-family:var(--sans);font-size:.7rem;min-width:3.2em;letter-spacing:.1em}
  .achv .got .mark{color:var(--gold)} .achv .got{color:var(--ink)}
  .achv .not{color:var(--ink-dim)} .achv .not .mark{color:var(--line)}
  .logline{font-size:.86rem;padding:7px 0;border-bottom:1px dashed var(--line);line-height:1.7}
  .logline .lt{color:var(--ink-dim)} .logline .lc{color:var(--gold);font-size:.8rem;display:block}
  .save-area{width:100%;background:#0d1226;color:var(--signal);border:1px solid var(--line);
    border-radius:3px;font-family:monospace;font-size:.72rem;padding:10px;min-height:96px;
    word-break:break-all;line-height:1.5}
  .modal .note{font-family:var(--sans);font-size:.74rem;color:var(--ink-dim);margin:8px 0;line-height:1.7}
  .modal .btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .save-msg{font-family:var(--sans);font-size:.76rem;color:var(--signal);min-height:1.2em;margin-top:6px}

  /* トースト */
  .toasts{position:fixed;top:16px;right:16px;z-index:20;
    display:flex;flex-direction:column;gap:8px;align-items:flex-end;pointer-events:none}
  .toast{background:var(--panel2);border:1px solid var(--gold-dim);color:var(--gold);
    font-family:var(--sans);font-size:.78rem;letter-spacing:.08em;padding:8px 18px;border-radius:20px;
    opacity:0;transition:opacity .35s;pointer-events:auto;cursor:pointer}
  .toast.show{opacity:1}

  @media (max-width:600px){
    .toasts{left:16px;align-items:center}
    .scene{grid-template-columns:1fr;gap:12px}
    .scene-title{writing-mode:horizontal-tb;border-left:none;border-bottom:1px solid var(--line);
      padding:0 0 8px}
    .scene-title .chap{margin-left:0;margin-right:12px}
    .title-screen{grid-template-columns:1fr;padding-top:30px}
    .title-main{writing-mode:horizontal-tb;border-right:none;border-bottom:2px solid var(--gold);
      padding:0 0 14px;min-height:0;font-size:2.2rem;justify-self:start;margin-bottom:8px}
    .title-main small{margin:8px 0 0}
    .rx-loc{margin-left:0;width:100%}
  }
</style>
</head>
<body>
<div class="stars" aria-hidden="true"></div>
<div class="wrap">
  <header>
    <div class="brand">残響の海</div>
    <nav>
      <button id="btnUndo" title="直前の選択をやり直す">一手戻る</button>
      <button id="btnLog">航海録</button>
      <button id="btnGloss">用語集</button>
      <button id="btnAchv">結末</button>
      <button id="btnSave">通信記録</button>
      <button id="btnTitle">表題へ</button>
    </nav>
  </header>
  <div class="receiver" id="receiver" style="display:none">
    <div class="rx-block">
      <span class="rx-label">共鳴</span>
      <canvas id="wave" width="120" height="26" aria-hidden="true"></canvas>
      <span class="rx-num" id="resNum">0/10</span>
    </div>
    <div class="rx-block">
      <span class="rx-label">断片</span>
      <div class="frag-dots" id="fragDots"></div>
    </div>
    <div class="rx-loc" id="rxLoc"></div>
  </div>
  <main id="main" aria-live="polite"></main>
</div>

<div class="modal-bg" id="modalBg" role="dialog" aria-modal="true">
  <div class="modal" id="modalBox"></div>
</div>
<div class="toasts" id="toasts"></div>

<script>
// ============================================================
// 『残響の海』 物語データ — 単一の真実源
// 条件DSL: {res:n}=共鳴n以上 / {flag:"x"} / {notFlag:"x"} /
//          {frag:"fx"} / {fragCount:n} / {all:[...]} / {any:[...]}
// 効果:    {res:+n, flag:"x"|[..], unflag:"x", frag:"fx"}
// choice.to: 文字列 or [{if:cond, to:"id"},{to:"既定"}]
// ============================================================
const STORY = {
  meta: {
    title: "残響の海",
    subtitle: "軌道清掃船〈ヒバリ〉航海録",
    intro: "西暦二一四三年。四十五年前の衝突連鎖〈大破砕〉以来、地球低軌道は砕けた衛星の欠片が潮のように流れる〈浅瀬〉と化した。あなたは軌道清掃船〈ヒバリ〉を駆る掃除屋。今日の獲物は、四十年前に死んだはずの——歌う衛星。",
    howto: [
      "物語を読み、選択肢を選んで進みます(数字キーでも選べます)。",
      "【共鳴】…… 死んだ機械たちの声に耳を澄ますと高まります。深い共鳴だけが開く扉があります。",
      "【断片】…… 海で拾い集めた記憶。最大四つ。集めた数が結末を変えることがあります。",
      "結末は全部で六つ。「一手戻る」でいつでも直前の選択をやり直せます。"
    ]
  },
  glossary: [
    { term: "残響(ざんきょう)", def: "長い年月、人の声や電波を浴び続けた機械に宿る「声の名残」。幽霊とも魂とも、ただの信号異常とも言われる。掃除屋の間の隠語。" },
    { term: "浅瀬(あさせ)", def: "デブリが密集する地球低軌道の俗称。時速数万キロの砂粒が飛び交う、宇宙で最も危険な海。" },
    { term: "大破砕(だいはさい)", def: "二〇九八年に起きた衛星の衝突連鎖事故。数千の衛星が砕け、低軌道は十年近く閉鎖された。" },
    { term: "掃除屋", def: "軌道上のデブリを回収・処分する民間業者。宇宙の漁師とも墓守とも呼ばれる。" },
    { term: "磁気錨(じきいかり)", def: "清掃船の主装備。電磁石の銛を撃ち込み、デブリを係留・回収する。撃ち方次第では武器にもなる。" },
    { term: "墓標の海", def: "高度八〇〇キロ付近、大破砕の震源域。冷戦期からの死んだ衛星が最も濃く積み重なる場所。" },
    { term: "共鳴", def: "残響の声が「聞こえる」度合い。耳を澄ます者にだけ、海は深いところまで語りかける。" }
  ],
  startNode: "start",
  nodes: {
    // ---------- 第一章 浅瀬 ----------
    start: {
      chapter: "第一章 浅瀬",
      title: "拾い屋の朝",
      text: "高度五五〇キロ。夜側の地球は黒い海のようで、都市の光が砂金のように散っている。あなたは軌道清掃船〈ヒバリ〉の操縦席で、契約書の最終ページに親指を押しつけた。\n今回の獲物は、四十年前に死んだ気象衛星〈しらさぎ8号〉。回収して高度を落とし、大気で燃やす。それだけの、いつもの仕事のはずだった。\n船載AI〈モズ〉の合成音声が言う。「ひとつ、妙なことがあります。聞きますか」",
      choices: [
        { label: "「聞こう」", to: "briefing" },
        { label: "「あとでいい。出るぞ」", to: "departure" }
      ]
    },
    briefing: {
      chapter: "第一章 浅瀬",
      title: "モズの報告",
      text: "「〈しらさぎ8号〉は死んでいるはずなのに、電波を出しています。出力は微弱、変調は旧式。内容は——子守唄です。人間の、古い子守唄」\nモズは事務的な声のまま続ける。「掃除屋の間では『残響』と呼ぶそうですね。長く人の声を浴びた機械に残る、声のようなもの。わたしは統計上の異常としか言えませんが……あなたは、信じますか」\nあなたは答えず、係留を解いた。信じるかどうかは、会ってから決めればいい。",
      effects: { flag: "mozTrust" },
      choices: [{ label: "出港する", to: "departure" }]
    },
    departure: {
      chapter: "第一章 浅瀬",
      title: "二本の航路",
      text: "低軌道は〈浅瀬〉と呼ばれる。二〇九八年の大破砕以来、砕けた衛星の欠片が潮のように流れ、時速数万キロの砂粒が船殻を叩く海だ。\nレーダーに、目的地までの二本の航路が浮かぶ。管制が引いた正規航路は安全だが遠回り。破片流を横切る近道は、腕に自信のある者だけの道。",
      choices: [
        { label: "正規航路を行く", to: "lane_safe" },
        { label: "破片流を横切る近道へ", to: "lane_short" }
      ]
    },
    lane_safe: {
      chapter: "第一章 浅瀬",
      title: "漂流物",
      text: "正規航路は静かだった。ただ一度だけ、レーダーが小さな影を拾う。\n船外服の手袋だ。指の形のまま凍りつき、四十年、ここを回り続けている。持ち主の名はもう分からない。大破砕の夜に失われた、誰かの右手の記憶。\nモズが言う。「回収しますか。遺品として登録できます」",
      choices: [
        { label: "回収する", effects: { frag: "f1" }, to: "approach" },
        { label: "手を合わせ、航路を譲る", effects: { res: 1 }, to: "approach" }
      ]
    },
    lane_short: {
      chapter: "第一章 浅瀬",
      title: "破片流",
      text: "近道は、砂嵐の中を泳ぐのに似ていた。回避機動の連続。それでも一粒、掠めた。船殻に火花が走り、警報が鳴る。外殻第三パネル損傷。致命傷ではないが、無傷でもない。\n息をついたその時、あなたは聞いた。ノイズの奥、流れ去る破片の川の中から、微かな——歌。口ずさむような、数え歌のような。振り返っても、そこには砂粒の奔流があるだけだ。",
      effects: { flag: "dmg", res: 1 },
      choices: [
        { label: "船外に出て応急修理をする", to: "patch" },
        { label: "漂う軍の残骸を漁ってから行く", to: "scav" },
        { label: "構わず先を急ぐ", to: "approach" }
      ]
    },
    scav: {
      chapter: "第一章 浅瀬",
      title: "軍の残骸",
      text: "破片流の芯に、ひときわ大きな影が流れていた。旧軍の軌道衛星——〈オロチ〉の僚機の亡骸だ。拾い屋の勘が疼いた。\nこじ開けた制御区画は焼けていたが、基板には指揮系統の識別符号が、炭化したままの形で残っていた。桁を読み上げ、モズに控えさせる。軍の網は、同じ鍵で束ねられている。この符号を知る者には、網のどこが装甲で、どこが継ぎ目なのかが読める。\n警報が短く鳴った。長居する場所ではない。",
      effects: { flag: "kingCode" },
      choices: [
        { label: "応急修理も済ませて発つ", to: "patch" },
        { label: "このまま先を急ぐ", to: "approach" }
      ]
    },
    patch: {
      chapter: "第一章 浅瀬",
      title: "応急修理",
      text: "船外に出て、損傷パネルに補修材を流し込む。命綱の先で地球が回り、沈黙が耳に痛い。\n「ひとつ聞いても」とモズが回線越しに言う。「さっき、何かを聴いた顔をしていましたね。カメラ越しでも分かりました」\nあなたが答えずにいると、モズは続けた。「……わたしにも、聞こえた気がしたんです。統計上の異常、と記録しておきますが」\n修理を終え、船内へ戻る。船体は元通りだ。",
      effects: { flag: "mozTrust", unflag: "dmg" },
      choices: [{ label: "先へ進もう", to: "approach" }]
    },
    approach: {

      text: "〈ヒバリ〉は今日も飛んでいる。積荷は数千の声。航路は決めていない。\n月の裏では織り手たちが星図を編み、深夜の当直では王が昔語りをする。見張り塔から見た四十年分の地球の話は、何度聞いても飽きない。眠れない夜には、しらさぎが歌う。\nあなたは掃除屋を辞めた。職業を問われたら、こう答えることにしている。\n——墓守だ。ただし、うちの積荷は皆、よく眠り、よく喋る。"
    },
    ending_crown: {
      chapter: "終章",
      title: "継ぎ接ぎの王冠",
      ending: { key: "crown", name: "終幕・継ぎ接ぎの王冠", tone: "dark" },
      text: "連鎖は三日で低軌道を呑み込んだ。衛星は次々と砕け、通信網は千切れ、人類は百年、空へ出る扉を失った。\nそれでも夜が来るたび、人々は空を見上げる。破片の環が夕陽を受けて、銀の王冠のように輝くからだ。あまりに美しく、あまりに遠い。\n地上に降りたあなたは知っている。あの王冠の中心で、八重の声が今も呼び続けていることを。\nすべての壊れた子どもたちを。還る場所へ。"
    },
    ending_silence: {
      chapter: "終章",
      title: "沈黙の海",
      ending: { key: "silence", name: "終幕・沈黙の海", tone: "still" },
      text: "報酬は言い値どおり支払われ、あなたの名は業界に轟いた。軌道連鎖を未然に防いだ英雄。仕事は選び放題になった。\nただ、浅瀬はもう歌わない。回収するどの破片も、ただの金属で、ただのゴミだ。あれ以来、モズは一度も「妙なこと」を報告してこない。\n時々、夢を見る。ねむれ、ねむれ、と誰かが歌う夢だ。\n目が覚めると、あなたはいつも、操縦席で受信機の周波数を回している。\n何も、聞こえない。"
    },
    ending_ring: {
      chapter: "終章",
      title: "還る場所",
      ending: { key: "ring", name: "終幕・還る場所", tone: "true" },
      text: "十年後。低軌道には銀の環が架かっている。\n歪みなく織り直されたそれは、もう墓標ではない。落ちてくる破片を受け止め、旅立つ船を導く、世界最大の港だ。管理者の欄にはこう記されている。〈オロチ〉および残響一同——地球で最も勤勉な、死んだ機械たち。\n環の突端では、白い灯台が明滅している。行き交う船は皆知っている。あの灯りは航路標識であり、同時に、歌なのだと。ねむれ、ねむれ。かつて誰にも届かなかった子守唄は、今、海を渡るすべての船に届いている。\nあなたは今日も浅瀬を飛ぶ。肩書きは変わらない。掃除屋。ただし名刺には、王の直筆でひとこと添えられている。\n「友人」"
    }
  },
  endingOrder: ["return", "silence", "meteor", "ark", "crown", "ring"]
};
if (typeof module !== "undefined") module.exports = STORY;

</script>
<script>
(function(){
  "use strict";
  const FRAG_NAMES = { f1:"凍った手袋", f2:"しらさぎの名前", f3:"三保の最後の声", f4:"環の織り図" };
  const FRAG_ORDER = ["f1","f2","f3","f4"];
  const $ = id => document.getElementById(id);
  const main = $("main");

  // ---------- 状態 ----------
  let S = null;               // {node,res,frags:Set,flags:Set,visited:Set,log:[]}
  let achieved = new Set();   // セッション内のエンディング記録(セーブコードにも含む)
  let undoStack = [];

  function freshState(){
    return { node: STORY.startNode, res:0, frags:new Set(), flags:new Set(), visited:new Set(), log:[] };
  }
  function snapshot(){
    return { node:S.node, res:S.res, frags:[...S.frags], flags:[...S.flags],
             visited:[...S.visited], logLen:S.log.length };
  }
  function restore(sn){
    S.node=sn.node; S.res=sn.res; S.frags=new Set(sn.frags);
    S.flags=new Set(sn.flags); S.visited=new Set(sn.visited);
    S.log.length = sn.logLen;
  }

  // ---------- 条件・効果(検証スクリプトと同一の意味論) ----------
  function evalCond(c){
    if(!c) return true;
    if(c.all) return c.all.every(evalCond);
    if(c.any) return c.any.some(evalCond);
    if("res" in c && !(S.res >= c.res)) return false;
    if("flag" in c && !S.flags.has(c.flag)) return false;
    if("notFlag" in c && S.flags.has(c.notFlag)) return false;
    if("frag" in c && !S.frags.has(c.frag)) return false;
    if("fragCount" in c && !(S.frags.size >= c.fragCount)) return false;
    return true;
  }
  function applyEffects(e){
    if(!e) return;
    if(e.res){ const before=S.res; S.res=Math.max(0,Math.min(10,S.res+e.res));
      if(S.res>before) toast("共鳴が深まった(+"+(S.res-before)+")"); }
    if(e.flag){ (Array.isArray(e.flag)?e.flag:[e.flag]).forEach(f=>S.flags.add(f)); }
    if(e.unflag){ S.flags.delete(e.unflag); }
    if(e.frag && !S.frags.has(e.frag)){ S.frags.add(e.frag);
      toast("記憶の断片:〈"+FRAG_NAMES[e.frag]+"〉"); }
  }
  function resolveTo(to){
    if(typeof to === "string") return to;
    for(const b of to){ if(evalCond(b.if)) return b.to; }
    return to[to.length-1].to;
  }

  // ---------- 進行 ----------
  function choose(choice){
    undoStack.push(snapshot());
    if(undoStack.length>120) undoStack.shift();
    const node = STORY.nodes[S.node];
    S.log.push({ t: node.title, c: choice.label });
    applyEffects(choice.effects);
    const dest = resolveTo(choice.to);
    enterNode(dest);
  }
  function enterNode(id){
    S.node = id;
    const node = STORY.nodes[id];
    if(!S.visited.has(id)){ S.visited.add(id); applyEffects(node.effects); }
    if(node.ending) achieved.add(node.ending.key);
    render();
    window.scrollTo({top:0, behavior:"auto"});
  }
  function undo(){
    if(!undoStack.length || !S) return;
    restore(undoStack.pop());
    render();
  }
  function startGame(){
    S = freshState();
    undoStack = [];
    enterNode(STORY.startNode);
  }

  // ---------- 描画 ----------
  function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function render(){
    if(!S){ renderTitle(); return; }
    $("receiver").style.display = "";
    const node = STORY.nodes[S.node];
    $("resNum").textContent = S.res + "/10";
    $("rxLoc").textContent = node.chapter;
    $("fragDots").innerHTML = FRAG_ORDER.map(f=>{
      const on = S.frags.has(f);
      return '<div class="frag-dot'+(on?" on":"")+'" title="'+(on?esc(FRAG_NAMES[f]):"未取得")+'"></div>';
    }).join("");
    $("btnUndo").disabled = undoStack.length===0;

    const paras = node.text.split("\n").map((p,i)=>
      '<p class="para" style="--i:'+i+'">'+esc(p)+"</p>").join("");
    let html = '<div class="scene">'+
      '<div class="scene-title"><span class="ttl">'+esc(node.title)+'</span>'+
      '<span class="chap">'+esc(node.chapter)+'</span></div>'+
      '<div class="scene-text">'+paras+'</div></div>';

    if(node.ending){
      const total = STORY.endingOrder.length;
      html += '<div class="ending-card tone-'+node.ending.tone+'">'+
        '<div class="ending-eyebrow">ここに一つの結末</div>'+
        '<div class="ending-name">'+esc(node.ending.name)+'</div>'+
        '<div class="ending-count">見届けた結末 '+achieved.size+' / '+total+'</div>'+
        '<div class="btnrow">'+
        '<button class="btn" id="edAgain">最初から読み直す</button>'+
        '<button class="btn secondary" id="edAchv">結末の一覧</button>'+
        '<button class="btn secondary" id="edTitle">表題へ戻る</button>'+
        '</div></div>';
      main.innerHTML = html;
      $("edAgain").onclick = startGame;
      $("edAchv").onclick = ()=>openModal("achv");
      $("edTitle").onclick = ()=>{ S=null; undoStack=[]; render(); };
    } else {
      html += '<div class="choices" id="choices"></div>';
      main.innerHTML = html;
      const box = $("choices");
      let num = 0;
      (node.choices||[]).forEach(ch=>{
        const ok = evalCond(ch.if);
        if(!ok && !ch.lockedHint) return;         // 条件不成立かつヒント無しは非表示
        const btn = document.createElement("button");
        btn.className = "choice"+(ok?"":" locked");
        if(ok){
          num++;
          btn.innerHTML = '<span class="num">'+num+'</span><span>'+esc(ch.label)+'</span>';
          btn.dataset.key = num;
          btn.onclick = ()=>choose(ch);
        } else {
          btn.innerHTML = '<span class="num">鎖</span><span>'+esc(ch.label)+
            '<span class="locked-hint">'+esc(ch.lockedHint)+'</span></span>';
          btn.disabled = false; btn.setAttribute("aria-disabled","true");
        }
        box.appendChild(btn);
      });
    }
    drawWave();
  }

  function renderTitle(){
    $("receiver").style.display = "none";
    $("btnUndo").disabled = true;
    const m = STORY.meta;
    main.innerHTML =
      '<div class="title-screen">'+
      '<div class="title-body">'+
      '<p class="lead">'+esc(m.intro)+'</p>'+
      '<ul class="howto">'+m.howto.map(h=>'<li>'+esc(h)+'</li>').join("")+'</ul>'+
      '<div class="title-btns">'+
      '<button class="btn" id="tStart">航海をはじめる</button>'+
      '<button class="btn secondary" id="tLoad">通信記録から再開する</button>'+
      '</div></div>'+
      '<div class="title-main">'+esc(m.title)+'<small>'+esc(m.subtitle)+'</small></div>'+
      '</div>';
    $("tStart").onclick = startGame;
    $("tLoad").onclick = ()=>openModal("save");
  }

  // ---------- 受信波形(共鳴で振幅が変わる) ----------
  const wave = $("wave"), wctx = wave.getContext("2d");
  const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  let t = 0;
  function drawWave(){
    const w=wave.width, h=wave.height, amp=(S?S.res:0)/10;
    wctx.clearRect(0,0,w,h);
    wctx.beginPath();
    for(let x=0;x<=w;x++){
      const y = h/2 + Math.sin(x*0.16 + t)*(1.5 + amp*(h/2-3))*Math.sin(x*0.021+t*0.6);
      x===0 ? wctx.moveTo(x,y) : wctx.lineTo(x,y);
    }
    wctx.strokeStyle = "#7EC4BC"; wctx.lineWidth = 1.2; wctx.stroke();
  }
  function loop(){ t+=0.06; if(S) drawWave(); requestAnimationFrame(loop); }
  if(!reduced) requestAnimationFrame(loop);

  // ---------- モーダル ----------
  const modalBg = $("modalBg"), modalBox = $("modalBox");
  function closeModal(){ modalBg.classList.remove("open"); }
  modalBg.addEventListener("click", e=>{ if(e.target===modalBg) closeModal(); });

  function openModal(kind){
    let html = "";
    if(kind==="gloss"){
      html = '<h2>用語集</h2><dl class="gloss">'+
        STORY.glossary.map(g=>'<dt>'+esc(g.term)+'</dt><dd>'+esc(g.def)+'</dd>').join("")+'</dl>';
    }
    if(kind==="achv"){
      const rows = STORY.endingOrder.map(key=>{
        let name=null;
        for(const id in STORY.nodes){ const e=STORY.nodes[id].ending;
          if(e && e.key===key){ name=e.name; break; } }
        const got = achieved.has(key);
        return '<li class="'+(got?"got":"not")+'"><span class="mark">'+(got?"到達":"未達")+
          '</span><span>'+(got?esc(name):"???")+'</span></li>';
      }).join("");
      html = '<h2>結末の一覧('+achieved.size+' / '+STORY.endingOrder.length+')</h2>'+
        '<ul class="achv">'+rows+'</ul>'+
        '<p class="note">結末は全部で'+STORY.endingOrder.length+'種。選び直したいときは「一手戻る」を。</p>';
    }
    if(kind==="log"){
      const lines = S && S.log.length
        ? S.log.map(l=>'<div class="logline"><span class="lt">'+esc(l.t)+'</span>'+
            '<span class="lc">→ '+esc(l.c)+'</span></div>').join("")
        : '<p class="note">まだ航海録はありません。</p>';
      html = '<h2>航海録(たどった選択)</h2>'+lines;
    }
    if(kind==="save"){
      const code = S ? makeCode() : "";
      html = '<h2>通信記録(セーブ)</h2>'+
        '<p class="note">下のコードを控えれば、あとで同じ場所から再開できます。'+
        '(ブラウザには保存されません)</p>'+
        '<textarea class="save-area" id="saveOut" readonly>'+esc(code)+'</textarea>'+
        '<div class="btnrow"><button class="btn" id="copyCode"'+(S?"":" disabled")+'>コードを写す</button></div>'+
        '<p class="note" style="margin-top:18px">再開するには、控えたコードを貼り付けてください。</p>'+
        '<textarea class="save-area" id="saveIn" placeholder="ここにコードを貼り付け"></textarea>'+
        '<div class="btnrow"><button class="btn" id="loadCode">この記録から再開</button></div>'+
        '<div class="save-msg" id="saveMsg"></div>';
    }
    modalBox.innerHTML = html + '<div class="close-row"><button class="btn secondary" id="mClose">閉じる</button></div>';
    $("mClose").onclick = closeModal;
    if(kind==="save"){
      const msg = $("saveMsg");
      $("copyCode") && ($("copyCode").onclick = ()=>{
        const ta=$("saveOut"); ta.select();
        try{ navigator.clipboard ? navigator.clipboard.writeText(ta.value) : document.execCommand("copy");
          msg.textContent="写しました。安全な場所に控えてください。"; }
        catch(e){ msg.textContent="全選択されています。手動でコピーしてください。"; }
      });
      $("loadCode").onclick = ()=>{
        const v=$("saveIn").value.trim();
        if(!v){ msg.textContent="コードが空です。"; return; }
        try{ loadCode(v); closeModal(); }
        catch(e){ msg.textContent="コードを読み取れませんでした。写し間違いがないか確認を。"; }
      };
    }
    modalBg.classList.add("open");
  }

  function makeCode(){
    const p = { v:1, node:S.node, res:S.res, frags:[...S.frags], flags:[...S.flags],
      visited:[...S.visited], endings:[...achieved], log:S.log.slice(-60) };
    return btoa(unescape(encodeURIComponent(JSON.stringify(p))));
  }
  function loadCode(code){
    const p = JSON.parse(decodeURIComponent(escape(atob(code))));
    if(p.v!==1 || !STORY.nodes[p.node]) throw new Error("bad");
    S = freshState();
    S.node=p.node; S.res=p.res|0; S.frags=new Set(p.frags||[]);
    S.flags=new Set(p.flags||[]); S.visited=new Set(p.visited||[]); S.log=p.log||[];
    achieved = new Set(p.endings||[]);
    undoStack = [];
    render();
    toast("通信記録から再開しました");
  }

  // ---------- トースト ----------
  function toast(text){
    const box=$("toasts");
    const el=document.createElement("div");
    el.className="toast"; el.textContent=text;
    el.title="クリックで閉じる";
    el.onclick = ()=>{ el.classList.remove("show"); setTimeout(()=>el.remove(),300); };
    box.appendChild(el);
    requestAnimationFrame(()=>el.classList.add("show"));
    setTimeout(()=>{ el.classList.remove("show"); setTimeout(()=>el.remove(),400); }, 3400);
  }

  // ---------- 入力 ----------
  $("btnUndo").onclick = undo;
  $("btnGloss").onclick = ()=>openModal("gloss");
  $("btnAchv").onclick = ()=>openModal("achv");
  $("btnLog").onclick = ()=>openModal("log");
  $("btnSave").onclick = ()=>openModal("save");
  $("btnTitle").onclick = ()=>{ S=null; undoStack=[]; render(); };
  document.addEventListener("keydown", e=>{
    if(modalBg.classList.contains("open")){ if(e.key==="Escape") closeModal(); return; }
    if(!S) return;
    if(e.key>="1" && e.key<="9"){
      const btn=document.querySelector('.choice[data-key="'+e.key+'"]');
      if(btn) btn.click();
    }
  });

  render();
})();
</script>
</body>
</html>

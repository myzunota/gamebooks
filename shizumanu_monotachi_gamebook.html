<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沈まぬ者たち ― 泥海と白い都 ― 潜り屋遠征記</title>
<style>
  :root{
    --bg:#161006;          /* 泥闇 */
    --panel:#231A0F;
    --panel2:#2C2113;
    --ink:#E6DCC3;         /* 生成り */
    --ink-dim:#9C8F74;
    --white:#EDE6D4;       /* 白泥 */
    --white-dim:#B7AD97;
    --mud:#7A5C33;         /* 泥 */
    --mud-deep:#4A3820;
    --danger:#B94F35;      /* 弁柄 */
    --heal:#8FB6A8;        /* 澄んだ水 */
    --line:#3A2D19;
    --serif:"Hiragino Mincho ProN","Yu Mincho","BIZ UDMincho","Noto Serif JP","Noto Serif CJK JP",serif;
    --sans:"Hiragino Kaku Gothic ProN","Yu Gothic Medium","Yu Gothic",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:16px}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--serif);
    line-height:1.95;min-height:100vh;overflow-x:hidden;
  }
  /* 地層 */
  .strata{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.55;
    background:
      linear-gradient(180deg, rgba(237,230,212,.045) 0%, transparent 18%),
      linear-gradient(180deg, transparent 30%, rgba(122,92,51,.10) 52%, transparent 56%),
      linear-gradient(180deg, transparent 66%, rgba(74,56,32,.22) 86%, rgba(38,28,15,.4) 100%),
      radial-gradient(1px 1px at 18% 35%, rgba(230,220,195,.25) 60%, transparent 61%),
      radial-gradient(1px 1px at 72% 58%, rgba(230,220,195,.18) 60%, transparent 61%),
      radial-gradient(1.4px 1.4px at 40% 78%, rgba(230,220,195,.15) 60%, transparent 61%),
      radial-gradient(1px 1px at 88% 22%, rgba(230,220,195,.2) 60%, transparent 61%);}
  @media (prefers-reduced-motion: no-preference){
    .para{opacity:0;transform:translateY(8px);animation:rise .7s ease forwards}
    @keyframes rise{to{opacity:1;transform:none}}
    .mudfill{transition:height .8s ease}
    .hpfill{transition:width .5s ease}
  }
  .wrap{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:0 20px 96px}

  header{display:flex;align-items:baseline;justify-content:space-between;gap:8px;
    padding:14px 2px 10px;border-bottom:1px solid var(--line);font-family:var(--sans)}
  .brand{font-family:var(--serif);letter-spacing:.3em;font-size:.95rem;color:var(--ink-dim);white-space:nowrap}
  nav{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
  nav button{background:none;border:1px solid var(--line);color:var(--ink-dim);
    font-family:var(--sans);font-size:.72rem;padding:4px 9px;border-radius:3px;cursor:pointer;letter-spacing:.08em}
  nav button:hover{border-color:var(--white-dim);color:var(--white)}
  nav button:disabled{opacity:.35;cursor:default}
  nav button:disabled:hover{border-color:var(--line);color:var(--ink-dim)}

  /* 様態パネル */
  .status{display:flex;align-items:center;gap:18px;flex-wrap:wrap;
    margin:14px 0 10px;padding:10px 14px;background:var(--panel);
    border:1px solid var(--line);border-radius:4px;font-family:var(--sans)}
  .st-label{font-size:.66rem;letter-spacing:.24em;color:var(--ink-dim)}
  .st-block{display:flex;align-items:center;gap:8px}
  .hpbar{position:relative;width:150px;height:12px;background:#120C05;border:1px solid var(--line);border-radius:2px;overflow:hidden}
  .hpfill{position:absolute;inset:0;width:100%;background:linear-gradient(90deg,#9c4630,var(--danger));}
  .hpbar .notch{position:absolute;top:0;bottom:0;width:1px;background:rgba(22,16,6,.7)}
  .st-num{font-size:.78rem;color:var(--ink);min-width:3.2em}
  .mudtube{position:relative;width:14px;height:34px;background:#120C05;border:1px solid var(--line);border-radius:2px 2px 4px 4px;overflow:hidden}
  .mudfill{position:absolute;left:0;right:0;bottom:0;height:0%;background:linear-gradient(180deg,#8a6a3d,var(--mud) 40%,var(--mud-deep))}
  .st-mudnum{font-size:.78rem;color:#C9A96B;min-width:2.6em}
  .drink{background:none;border:1px solid var(--heal);color:var(--heal);border-radius:3px;
    font-family:var(--sans);font-size:.72rem;letter-spacing:.1em;padding:4px 10px;cursor:pointer}
  .drink:hover{background:rgba(143,182,168,.1)}
  .st-loc{margin-left:auto;font-size:.72rem;letter-spacing:.15em;color:var(--ink-dim)}

  /* 所持品 */
  .inv{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin:0 0 24px;
    padding:7px 14px;background:var(--panel);border:1px solid var(--line);border-radius:4px;font-family:var(--sans)}
  .inv .st-label{flex-shrink:0}
  .chip{font-size:.74rem;color:var(--ink);border:1px solid var(--mud);border-radius:12px;
    padding:2px 10px;letter-spacing:.05em;cursor:default}
  .chip .cnt{color:#C9A96B;margin-left:2px}
  .inv .empty{font-size:.74rem;color:var(--ink-dim)}

  /* 場面 — 泥位線モチーフ */
  .scene{margin-bottom:32px}
  .scene-head{margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--mud);position:relative}
  .scene-head::after{content:"";position:absolute;left:0;bottom:-3px;width:56px;height:5px;
    background:linear-gradient(180deg,var(--mud) 40%,transparent);opacity:.7}
  .scene-head .chap{display:block;font-family:var(--sans);font-size:.68rem;letter-spacing:.4em;color:var(--ink-dim);margin-bottom:4px}
  .scene-head .ttl{font-size:1.45rem;letter-spacing:.22em;
    background:linear-gradient(180deg,var(--white) 42%,#C9A96B 58%,var(--mud) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .scene-text p{margin-bottom:1.15em;font-size:1.02rem;text-align:justify}
  .para{animation-delay:calc(var(--i) * .12s)}

  .combat-mark{display:inline-block;font-family:var(--sans);font-size:.64rem;letter-spacing:.3em;
    color:var(--danger);border:1px solid var(--danger);border-radius:2px;padding:1px 8px;margin-bottom:10px}

  /* 選択肢 */
  .choices{display:flex;flex-direction:column;gap:10px;margin-top:8px}
  .choice{display:flex;gap:12px;align-items:baseline;text-align:left;width:100%;
    background:var(--panel);border:1px solid var(--line);border-radius:4px;
    color:var(--ink);font-family:var(--serif);font-size:.98rem;line-height:1.7;
    padding:13px 16px;cursor:pointer;transition:border-color .15s,background .15s}
  .choice:hover{border-color:var(--white-dim);background:var(--panel2)}
  .choice:focus-visible{outline:2px solid var(--heal);outline-offset:2px}
  .choice .num{font-family:var(--sans);font-size:.72rem;color:#C9A96B;letter-spacing:.1em;min-width:1.2em}
  .choice.locked{cursor:default;opacity:.55;border-style:dashed}
  .choice.locked:hover{border-color:var(--line);background:var(--panel)}
  .choice.locked .num{color:var(--ink-dim)}
  .locked-hint{display:block;font-size:.76rem;color:var(--danger);margin-top:4px;font-family:var(--sans);letter-spacing:.04em}

  /* 終幕・落命 */
  .ending-card{margin-top:30px;padding:22px 20px;text-align:center;border:1px solid var(--white-dim);
    border-radius:4px;background:linear-gradient(180deg,var(--panel),#1B140A)}
  .ending-card.tone-true{border-color:var(--white);box-shadow:0 0 24px rgba(237,230,212,.14)}
  .ending-card.tone-dark{border-color:var(--danger)}
  .ending-card.tone-warm{border-color:#C9A96B}
  .ending-card.tone-death{border-color:var(--mud-deep);background:linear-gradient(180deg,#1B140A,#120C05)}
  .ending-eyebrow{font-family:var(--sans);font-size:.68rem;letter-spacing:.4em;color:var(--ink-dim);margin-bottom:10px}
  .ending-name{font-size:1.25rem;letter-spacing:.25em;color:var(--white);margin-bottom:16px}
  .ending-card.tone-death .ending-name{color:var(--ink-dim)}
  .ending-count{font-family:var(--sans);font-size:.75rem;color:var(--ink-dim);margin-bottom:18px}
  .ending-card .btnrow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .btn{background:none;border:1px solid var(--white-dim);color:var(--white);border-radius:3px;
    font-family:var(--sans);font-size:.8rem;letter-spacing:.12em;padding:9px 18px;cursor:pointer}
  .btn:hover{border-color:var(--white);background:rgba(237,230,212,.06)}
  .btn.secondary{border-color:var(--line);color:var(--ink-dim)}
  .btn.secondary:hover{color:var(--ink);border-color:var(--ink-dim);background:none}
  .btn.revive{border-color:var(--heal);color:var(--heal)}
  .btn.revive:hover{background:rgba(143,182,168,.08)}

  /* タイトル画面 — 半分泥に沈んだ題字 */
  .title-screen{padding:46px 0 20px;max-width:560px}
  .title-main{font-size:3rem;letter-spacing:.3em;line-height:1.3;margin-bottom:4px;
    background:linear-gradient(180deg,var(--white) 0%,var(--white) 46%,#C9A96B 56%,var(--mud) 78%,var(--mud-deep) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .title-sub{font-size:.9rem;letter-spacing:.3em;color:var(--ink-dim);margin-bottom:8px}
  .title-rule{height:1px;background:linear-gradient(90deg,var(--mud),transparent);margin:14px 0 24px;position:relative}
  .title-rule::before{content:"";position:absolute;left:0;top:-2px;width:90px;height:5px;
    background:linear-gradient(180deg,rgba(237,230,212,.5),transparent)}
  .title-body .lead{font-size:.95rem;color:var(--ink);margin-bottom:22px;text-align:justify}
  .howto{font-family:var(--sans);font-size:.78rem;color:var(--ink-dim);line-height:1.9;
    border:1px solid var(--line);border-radius:4px;padding:14px 16px;margin-bottom:24px}
  .howto li{list-style:none;padding-left:1em;text-indent:-1em;margin-bottom:4px}
  .howto li::before{content:"—";margin-right:.5em;color:var(--mud)}
  .title-btns{display:flex;flex-direction:column;gap:10px;max-width:280px}

  /* モーダル */
  .modal-bg{position:fixed;inset:0;background:rgba(10,7,3,.85);z-index:10;display:none;
    align-items:flex-start;justify-content:center;padding:6vh 16px}
  .modal-bg.open{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:5px;
    max-width:560px;width:100%;max-height:82vh;overflow-y:auto;padding:22px 24px}
  .modal h2{font-size:1rem;letter-spacing:.3em;color:var(--white);margin-bottom:16px;font-weight:normal}
  .modal .close-row{text-align:right;margin-top:18px}
  .gloss dt{color:#C9A96B;font-size:.92rem;margin-top:14px;letter-spacing:.06em}
  .gloss dd{font-size:.86rem;color:var(--ink-dim);line-height:1.85;margin-top:2px}
  .achv{list-style:none}
  .achv li{display:flex;gap:12px;align-items:baseline;padding:9px 2px;border-bottom:1px dashed var(--line);font-size:.9rem}
  .achv .mark{font-family:var(--sans);font-size:.7rem;min-width:3.2em;letter-spacing:.1em}
  .achv .got .mark{color:var(--white)} .achv .got{color:var(--ink)}
  .achv .not{color:var(--ink-dim)} .achv .not .mark{color:var(--line)}
  .logline{font-size:.86rem;padding:7px 0;border-bottom:1px dashed var(--line);line-height:1.7}
  .logline .lt{color:var(--ink-dim)} .logline .lc{color:#C9A96B;font-size:.8rem;display:block}
  .save-area{width:100%;background:#120C05;color:var(--heal);border:1px solid var(--line);
    border-radius:3px;font-family:monospace;font-size:.72rem;padding:10px;min-height:96px;
    word-break:break-all;line-height:1.5}
  .modal .note{font-family:var(--sans);font-size:.74rem;color:var(--ink-dim);margin:8px 0;line-height:1.7}
  .modal .btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .save-msg{font-family:var(--sans);font-size:.76rem;color:var(--heal);min-height:1.2em;margin-top:6px}
  .itemlist dt{color:var(--ink);font-size:.92rem;margin-top:12px}
  .itemlist dd{font-size:.84rem;color:var(--ink-dim);line-height:1.8}

  /* トースト */
  .toasts{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:20;
    display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
  .toast{background:var(--panel2);border:1px solid var(--mud);color:var(--ink);
    font-family:var(--sans);font-size:.78rem;letter-spacing:.08em;padding:8px 18px;border-radius:20px;
    opacity:0;transition:opacity .35s}
  .toast.show{opacity:1}
  .toast.dmg{border-color:var(--danger);color:var(--danger)}
  .toast.heal{border-color:var(--heal);color:var(--heal)}

  @media (max-width:600px){
    .title-main{font-size:2.1rem}
    .st-loc{margin-left:0;width:100%}
    .hpbar{width:110px}
  }
</style>
</head>
<body>
<div class="strata" aria-hidden="true"></div>
<div class="wrap">
  <header>
    <div class="brand">沈まぬ者たち</div>
    <nav>
      <button id="btnUndo" title="直前の選択をやり直す">一手戻る</button>
      <button id="btnLog">遠征記</button>
      <button id="btnItems">所持品</button>
      <button id="btnGloss">用語集</button>
      <button id="btnAchv">結末</button>
      <button id="btnSave">泥板記録</button>
      <button id="btnTitle">表題へ</button>
    </nav>
  </header>
  <div id="statusWrap" style="display:none">
    <div class="status">
      <div class="st-block">
        <span class="st-label">体力</span>
        <div class="hpbar" id="hpbar"><div class="hpfill" id="hpfill"></div></div>
        <span class="st-num" id="hpNum"></span>
      </div>
      <div class="st-block">
        <span class="st-label">泥なじみ</span>
        <div class="mudtube"><div class="mudfill" id="mudfill"></div></div>
        <span class="st-mudnum" id="mudNum"></span>
      </div>
      <button class="drink" id="btnDrink" style="display:none">水を飲む(+6)</button>
      <div class="st-loc" id="stLoc"></div>
    </div>
    <div class="inv"><span class="st-label">所持</span><span id="invChips"></span></div>
  </div>
  <main id="main" aria-live="polite"></main>
</div>

<div class="modal-bg" id="modalBg" role="dialog" aria-modal="true">
  <div class="modal" id="modalBox"></div>
</div>
<div class="toasts" id="toasts"></div>

<script>
// ============================================================
// 『沈まぬ者たち』 物語データ — 単一の真実源
// 条件DSL: {mud:n}=泥なじみn以上 / {hpLte:n}=体力n以下 /
//          {item:"x"} / {flag:"x"} / {notFlag:"x"} / {all:[..]} / {any:[..]}
// 効果:    {hp:±n, mud:±n, item:"x", n:個数, removeItem:"x",
//           flag:"x"|[..], unflag:"x"}
// choice.to: 文字列 or [{if:cond,to:"id"},{to:"既定"}]
// combat:true = 戦闘リアクションノード(本文字数基準を緩和)
// death:true  = 落命ノード(結末には数えない)
// ============================================================
const STORY = {
  meta: {
    title: "沈まぬ者たち",
    subtitle: "泥海と白い都 ― 潜り屋遠征記",
    maxhp: 18,
    intro: "ある朝、大地は約束を忘れた。〈流化〉——地面が泥へほどけた日から百年。人は杭の上に村を組み、泥に沈む深さで税を測られて生きている。北の空には白い都〈浮洲〉。軽さを独り占めした〈浮き人〉たちの国。あなたは黒泥に潜って沈んだ世界を拾い上げる、潜り屋だ。",
    howto: [
      "【体力】…… 尽きれば泥に沈み、落命します。蒸留水を飲めば回復できます(様態欄の「水を飲む」)。",
      "【泥なじみ】…… 泥に敬意を払うほど高まります。深みへの道と、いくつかの奇跡を開きます。",
      "【所持品】…… 選択肢を解く鍵。戦いの流れを変える物もあります。",
      "戦いでは相手の「予兆」を読みます。正しく読めば無傷、読み違えれば体力を失います。",
      "結末は全部で六つ。落命しても「直前に戻る」で選び直せます。"
    ]
  },
  glossary: [
    { term: "流化(りゅうか)", def: "百年前、大地が泥へとほどけた天変。原因は伝承の彼方——ということに、なっている。" },
    { term: "黒泥と白泥", def: "黒泥は重く、すべてを呑む。白泥は軽く、上に浮かぶ。白泥の上澄みを独占する者だけが、浮かんで暮らせる。" },
    { term: "浮き人(うきびと)", def: "白い都〈浮洲〉に住む貴族。軽さは血筋であり、権利であり、税の根拠である。" },
    { term: "錘の制(おもりのせい)", def: "浮き人の重さを、生まれながらに民へ移し替える制度。移し替えの証文を〈錘符(おもりふ)〉と呼ぶ。" },
    { term: "潜り屋", def: "黒泥に潜り、沈んだ旧世界から金物や道具を引き上げる稼業。泥にいちばん近い人間。" },
    { term: "検泥官(けんでいかん)", def: "浮洲の徴税吏。民の「沈み具合」を検分し、重さ税を課す。白い徽章が身分の証。" },
    { term: "臍の底(ほぞのそこ)", def: "泥海で最も深い場所。沈んだ都がそのままの姿で眠るという。並の潜りでは還れない。" },
    { term: "泥鰌組(どじょうぐみ)", def: "泥の水路を知り尽くした沼賊。義賊とも、ただの賊とも言われる。" },
    { term: "泥なじみ", def: "泥があなたを憶えている度合い。泥は、重さを厭わぬ者を好む。" }
  ],
  items: {
    water:   { name: "蒸留水",       desc: "澄んだ水。飲めば体力が6戻る。" },
    harpoon: { name: "銛",           desc: "使い込まれた潜り漁の銛。急所を知る者の得物。" },
    oil:     { name: "泥避けの油",   desc: "全身に塗れば泥も錠前も滑る。一度きり。" },
    pearl:   { name: "泥真珠",       desc: "泥蟹が百年磨いた珠。米の一年分、あるいは袖の下。" },
    float:   { name: "浮き袋",       desc: "潜りの浮き袋。深みで息を繋ぐ。" },
    badge:   { name: "検泥官の徽章", desc: "白い徽章。検問では、これほど効く札もない。" },
    seed:    { name: "根の種",       desc: "ガラス質の莢に包まれた一粒。世界を固かった頃へ繋ぎ直す、最後の種。" },
    deed:    { name: "大符",         desc: "すべての錘符の親札。紙一枚に、国ひとつ分の重さの根が書かれている。" }
  },
  startNode: "start",
  nodes: {
    // ---------- 第一章 黒泥 ----------
    start: {
      chapter: "第一章 黒泥",
      title: "杭立の村",
      text: "夜明けの泥海は、鈍い鉛色に凪いでいた。見渡す限りの泥、泥、泥。百年前の〈流化〉で大地は液状にほどけ、世界は底のない沼になった。\nあなたは杭上の村〈杭立(くいだち)〉の潜り屋だ。今日の仕事は、村の沖に沈む鐘楼から金物を引き上げること。\n桟橋の端で、道具屋のヌイ婆(ばあ)が手招きしている。「潜るのかい。餞別をひとつ、持っておゆき」",
      choices: [
        { label: "婆の店に寄る", to: "shop" },
        { label: "「急ぐんだ」——そのまま潜り場へ", to: "dive1" }
      ]
    },
    shop: {
      chapter: "第一章 黒泥",
      title: "ヌイ婆の店",
      text: "店といっても、筏に道具を並べただけの見世だ。婆は欠けた歯を見せて笑う。「若いの、泥はね、逆らう者から呑んでいくよ。——さあ、どれでも一つだけだ」\n並んでいるのは三つ。澄んだ水の壜がふたつ。使い込まれた銛がひと振り。泥避けの油の壺がひとつ。",
      choices: [
        { label: "蒸留水を二本もらう", effects: { item: "water", n: 2 }, to: "dive1" },
        { label: "銛をもらう", effects: { item: "harpoon" }, to: "dive1" },
        { label: "泥避けの油をもらう", effects: { item: "oil" }, to: "dive1" }
      ]
    },
    dive1: {

      text: "白い都が沈みきるまで、三日かかった。\n重さを返された浮き人の多くは泥の岸へ這い上がり、生まれて初めて、民と同じ高さで泥をかいた。溺れた者も、いた。その数を、誰も数えなかった。\n錘の消えた泥海に、その冬、杭村がいくつも増えた。カジカは言う。「上等な世直しなんて、ないのさ。あるのは泥だけだ」\nあなたは今日も潜る。沈んだ白い都は、存外いい漁場になった。"
    },
    ending_vengeance: {
      chapter: "終章",
      title: "白洲だけが沈む",
      ending: { key: "vengeance", name: "終幕・白洲だけが沈む", tone: "dark" },
      text: "その日、沈んだのは白洲の一族だけだった。\n国じゅうの重さを束で背負わされた浮き人たちは、白い楼閣ごと、静かに泥へ沈んでいった。民は歓声を上げ、それから、だんだんと黙った。沈んでいく白い都はあまりに静かで、あまりに正確に、百年前の意趣を返していたからだ。\n泥海から白い屋根が消えた夜、あなたは自分の掌を見た。\n札一枚で世界を沈める重さは、まだそこに、残っている。"
    },
    ending_noble: {
      chapter: "終章",
      title: "沈まぬ者",
      ending: { key: "noble", name: "終幕・沈まぬ者", tone: "dark" },
      text: "あなたは、沈まない。白い回廊を爪先で歩き、白い舟で運河を渡り、軽い声で笑うことを覚えた。\nただ——泥に、触れられなくなった。指先を運河の外へ伸ばしても、泥はするりと逃げていく。憶えて、いないのだ。もう。\n夜ごと、足の裏が何かを探して宙をかく。夢の中であなたは深く深く潜っていて、目が覚めると、体はどこまでも軽い。\n軽さとは、つまり、どこにも属さないということだった。"
    },
    ending_margin: {
      chapter: "終章",
      title: "泥境の暮らし",
      ending: { key: "margin", name: "終幕・泥境の暮らし", tone: "still" },
      text: "あなたは村へ帰り、潜り屋を続けた。\n世界は変わらない。白鷺は季節ごとに来て、重さを検分していく。ただ、村は少しだけ変わった。あなたの拾う金物で橋が延び、村の子らは弟子入りを志願し、ヌイ婆の唄には新しい節が増えた。\n泥はすべてを憶えている。ならば、今日をよく生きたことも、きっと憶えられているのだろう。\n夜明けの泥海は、今日も鈍く、静かに光る。"
    },
    // ---------- 落命(結末には数えない) ----------
    death_crab: {
      chapter: "落命",
      title: "鋏の底",
      death: true,
      text: "力が尽きた。泥は、暴れる者から呑む——ヌイ婆の言った通りだった。鋏があなたを泥床へ縫いとめ、視界が端から黒く閉じていく。\n最後に聞こえたのは、大鐘の中で反響する、自分の気泡の音だった。百年前から鳴らない鐘が、その日はじめて、鳴ったのかもしれない。"
    },
    death_deep: {
      chapter: "落命",
      title: "百尋の圧",
      death: true,
      text: "息が、届かなかった。百尋の泥はあなたの輪郭を静かに握り潰し、意識は暗い暖かさの中へほどけていく。痛みはない。深すぎる場所に、痛みは棲めない。\n臍の底は、すべてを憶えている。沈んだ都も、抜かれた根も。そして今日からは——あなたのことも。"
    },
    death_fight: {
      chapter: "落命",
      title: "白い棒杭",
      death: true,
      text: "膝が落ち、泥が迎えに来た。振り下ろされる打撃はやがて遠のき、罵声も、誰かの悲鳴も遠のいて、世界は鉛色の静けさに沈んでいく。\n重さ税の帳面には、短い一行が増えるだろう。「抵抗、一名。処理済み」——あなたの名は、書かれない。",
    },
    death_mud: {
      chapter: "落命",
      title: "曳かれ泥",
      death: true,
      text: "背負った重さに、泥のほうが先に気づいた。船底の泥流は思ったより深く、思ったより冷たい。指がふやけ、握力が先に死に、体がゆっくりと流れに剥がされていく。\n手が離れたことに、船上の誰も気づかない。泥境の泥は今日もひとつ、静かに重さを増した。"
    }
  },
  endingOrder: ["margin", "noble", "revolt", "edict", "vengeance", "root"]
};
if (typeof module !== "undefined") module.exports = STORY;

</script>
<script>
(function(){
  "use strict";
  const $ = id => document.getElementById(id);
  const main = $("main");
  const MAXHP = STORY.meta.maxhp;

  // ---------- 状態 ----------
  let S = null;               // {node,hp,mud,items:Map,flags:Set,visited:Set,log:[]}
  let achieved = new Set();   // 結末記録(落命は含めない)
  let undoStack = [];

  function freshState(){
    return { node: STORY.startNode, hp: MAXHP, mud: 0,
      items:new Map(), flags:new Set(), visited:new Set(), log:[] };
  }
  function snapshot(){
    return { node:S.node, hp:S.hp, mud:S.mud, items:[...S.items],
      flags:[...S.flags], visited:[...S.visited], logLen:S.log.length };
  }
  function restore(sn){
    S.node=sn.node; S.hp=sn.hp; S.mud=sn.mud; S.items=new Map(sn.items);
    S.flags=new Set(sn.flags); S.visited=new Set(sn.visited);
    S.log.length = sn.logLen;
  }
  const itemCount = id => S.items.get(id) || 0;

  // ---------- 条件・効果(検証スクリプトと同一の意味論) ----------
  function evalCond(c){
    if(!c) return true;
    if(c.all) return c.all.every(evalCond);
    if(c.any) return c.any.some(evalCond);
    if("mud" in c && !(S.mud >= c.mud)) return false;
    if("hpLte" in c && !(S.hp <= c.hpLte)) return false;
    if("item" in c && !(itemCount(c.item) > 0)) return false;
    if("flag" in c && !S.flags.has(c.flag)) return false;
    if("notFlag" in c && S.flags.has(c.notFlag)) return false;
    return true;
  }
  function applyEffects(e){
    if(!e) return;
    if(e.hp){
      const before = S.hp;
      S.hp = Math.min(MAXHP, S.hp + e.hp);      // 下限は落命判定のため0未満も保持
      if(e.hp < 0) toast("体力 "+e.hp, "dmg");
      else if(S.hp > before) toast("体力 +"+(S.hp-before), "heal");
    }
    if(e.mud){
      const before = S.mud;
      S.mud = Math.max(0, Math.min(10, S.mud + e.mud));
      if(S.mud > before) toast("泥なじみ +"+(S.mud-before));
    }
    if(e.item){
      const n = e.n || 1;
      S.items.set(e.item, itemCount(e.item) + n);
      toast("手に入れた:"+STORY.items[e.item].name + (n>1 ? " ×"+n : ""));
    }
    if(e.removeItem){
      const c = itemCount(e.removeItem);
      if(c > 1) S.items.set(e.removeItem, c-1); else S.items.delete(e.removeItem);
      toast("失った:"+STORY.items[e.removeItem].name);
    }
    if(e.flag) (Array.isArray(e.flag)?e.flag:[e.flag]).forEach(f=>S.flags.add(f));
    if(e.unflag) S.flags.delete(e.unflag);
  }
  function resolveTo(to){
    if(typeof to === "string") return to;
    for(const b of to){ if(evalCond(b.if)) return b.to; }
    return to[to.length-1].to;
  }

  // ---------- 進行 ----------
  function choose(choice){
    undoStack.push(snapshot());
    if(undoStack.length>150) undoStack.shift();
    const node = STORY.nodes[S.node];
    S.log.push({ t: node.title, c: choice.label });
    applyEffects(choice.effects);
    const dest = resolveTo(choice.to);
    if(S.hp < 0) S.hp = 0;
    enterNode(dest);
  }
  function enterNode(id){
    S.node = id;
    const node = STORY.nodes[id];
    if(!S.visited.has(id)){ S.visited.add(id); applyEffects(node.effects); }
    if(node.ending) achieved.add(node.ending.key);
    render();
    window.scrollTo({top:0, behavior:"auto"});
  }
  function undo(){
    if(!undoStack.length || !S) return;
    restore(undoStack.pop());
    render();
  }
  function startGame(){
    S = freshState();
    undoStack = [];
    enterNode(STORY.startNode);
  }
  function drink(){
    if(!S || itemCount("water")===0 || S.hp>=MAXHP) return;
    undoStack.push(snapshot());
    applyEffects({ removeItem:"water" });
    applyEffects({ hp:+6 });
    S.log.push({ t: STORY.nodes[S.node].title, c: "(蒸留水を飲んだ)" });
    render();
  }

  // ---------- 描画 ----------
  function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function renderStatus(node){
    $("statusWrap").style.display = "";
    const hp = Math.max(0, S.hp);
    $("hpfill").style.width = (hp/MAXHP*100)+"%";
    $("hpNum").textContent = hp+" / "+MAXHP;
    const bar = $("hpbar");
    bar.querySelectorAll(".notch").forEach(n=>n.remove());
    for(let i=1;i<6;i++){
      const d=document.createElement("div"); d.className="notch"; d.style.left=(i*100/6)+"%"; bar.appendChild(d);
    }
    $("mudfill").style.height = (S.mud*10)+"%";
    $("mudNum").textContent = S.mud+" / 10";
    $("stLoc").textContent = node.chapter;
    const chips = [...S.items].map(([id,n])=>
      '<span class="chip" title="'+esc(STORY.items[id].desc)+'">'+esc(STORY.items[id].name)+
      (n>1?'<span class="cnt">×'+n+'</span>':'')+'</span>').join(" ");
    $("invChips").innerHTML = chips || '<span class="empty">(何も持っていない)</span>';
    $("btnDrink").style.display = (itemCount("water")>0 && S.hp<MAXHP && !node.ending && !node.death) ? "" : "none";
  }

  function render(){
    if(!S){ renderTitle(); return; }
    const node = STORY.nodes[S.node];
    renderStatus(node);
    $("btnUndo").disabled = undoStack.length===0;

    const paras = node.text.split("\n").map((p,i)=>
      '<p class="para" style="--i:'+i+'">'+esc(p)+"</p>").join("");
    let html = '<div class="scene"><div class="scene-head">'+
      '<span class="chap">'+esc(node.chapter)+'</span>'+
      '<span class="ttl">'+esc(node.title)+'</span></div>'+
      (node.combat ? '<span class="combat-mark">予兆を読め</span>' : '')+
      '<div class="scene-text">'+paras+'</div></div>';

    if(node.death){
      html += '<div class="ending-card tone-death">'+
        '<div class="ending-eyebrow">落命</div>'+
        '<div class="ending-name">'+esc(node.title)+'</div>'+
        '<div class="ending-count">泥は憶えている。選び直せる。</div>'+
        '<div class="btnrow">'+
        '<button class="btn revive" id="dUndo">直前に戻る</button>'+
        '<button class="btn secondary" id="dAgain">最初から</button>'+
        '<button class="btn secondary" id="dTitle">表題へ</button>'+
        '</div></div>';
      main.innerHTML = html;
      $("dUndo").onclick = undo;
      $("dAgain").onclick = startGame;
      $("dTitle").onclick = ()=>{ S=null; undoStack=[]; render(); };
      return;
    }
    if(node.ending){
      const total = STORY.endingOrder.length;
      html += '<div class="ending-card tone-'+node.ending.tone+'">'+
        '<div class="ending-eyebrow">ここに一つの結末</div>'+
        '<div class="ending-name">'+esc(node.ending.name)+'</div>'+
        '<div class="ending-count">見届けた結末 '+achieved.size+' / '+total+'</div>'+
        '<div class="btnrow">'+
        '<button class="btn" id="edAgain">最初から読み直す</button>'+
        '<button class="btn secondary" id="edAchv">結末の一覧</button>'+
        '<button class="btn secondary" id="edTitle">表題へ戻る</button>'+
        '</div></div>';
      main.innerHTML = html;
      $("edAgain").onclick = startGame;
      $("edAchv").onclick = ()=>openModal("achv");
      $("edTitle").onclick = ()=>{ S=null; undoStack=[]; render(); };
      return;
    }
    html += '<div class="choices" id="choices"></div>';
    main.innerHTML = html;
    const box = $("choices");
    let num = 0;
    (node.choices||[]).forEach(ch=>{
      const okC = evalCond(ch.if);
      if(!okC && !ch.lockedHint) return;   // 条件不成立かつヒント無しは非表示
      const btn = document.createElement("button");
      btn.className = "choice"+(okC?"":" locked");
      if(okC){
        num++;
        btn.innerHTML = '<span class="num">'+num+'</span><span>'+esc(ch.label)+'</span>';
        btn.dataset.key = num;
        btn.onclick = ()=>choose(ch);
      } else {
        btn.innerHTML = '<span class="num">鎖</span><span>'+esc(ch.label)+
          '<span class="locked-hint">'+esc(ch.lockedHint)+'</span></span>';
        btn.setAttribute("aria-disabled","true");
      }
      box.appendChild(btn);
    });
  }

  function renderTitle(){
    $("statusWrap").style.display = "none";
    $("btnUndo").disabled = true;
    const m = STORY.meta;
    main.innerHTML =
      '<div class="title-screen">'+
      '<div class="title-main">'+esc(m.title)+'</div>'+
      '<div class="title-sub">'+esc(m.subtitle)+'</div>'+
      '<div class="title-rule"></div>'+
      '<div class="title-body">'+
      '<p class="lead">'+esc(m.intro)+'</p>'+
      '<ul class="howto">'+m.howto.map(h=>'<li>'+esc(h)+'</li>').join("")+'</ul>'+
      '<div class="title-btns">'+
      '<button class="btn" id="tStart">泥海へ潜る</button>'+
      '<button class="btn secondary" id="tLoad">泥板記録から再開する</button>'+
      '</div></div></div>';
    $("tStart").onclick = startGame;
    $("tLoad").onclick = ()=>openModal("save");
  }

  // ---------- モーダル ----------
  const modalBg = $("modalBg"), modalBox = $("modalBox");
  function closeModal(){ modalBg.classList.remove("open"); }
  modalBg.addEventListener("click", e=>{ if(e.target===modalBg) closeModal(); });

  function openModal(kind){
    let html = "";
    if(kind==="gloss"){
      html = '<h2>用語集</h2><dl class="gloss">'+
        STORY.glossary.map(g=>'<dt>'+esc(g.term)+'</dt><dd>'+esc(g.def)+'</dd>').join("")+'</dl>';
    }
    if(kind==="items"){
      const rows = S && S.items.size
        ? '<dl class="itemlist">'+[...S.items].map(([id,n])=>
            '<dt>'+esc(STORY.items[id].name)+(n>1?" ×"+n:"")+'</dt><dd>'+esc(STORY.items[id].desc)+'</dd>').join("")+'</dl>'
        : '<p class="note">いまは何も持っていない。</p>';
      html = '<h2>所持品</h2>'+rows;
    }
    if(kind==="achv"){
      const rows = STORY.endingOrder.map(key=>{
        let name=null;
        for(const id in STORY.nodes){ const e=STORY.nodes[id].ending;
          if(e && e.key===key){ name=e.name; break; } }
        const got = achieved.has(key);
        return '<li class="'+(got?"got":"not")+'"><span class="mark">'+(got?"到達":"未達")+
          '</span><span>'+(got?esc(name):"???")+'</span></li>';
      }).join("");
      html = '<h2>結末の一覧('+achieved.size+' / '+STORY.endingOrder.length+')</h2>'+
        '<ul class="achv">'+rows+'</ul>'+
        '<p class="note">結末は全部で'+STORY.endingOrder.length+'種。落命は結末に数えない。</p>';
    }
    if(kind==="log"){
      const lines = S && S.log.length
        ? S.log.map(l=>'<div class="logline"><span class="lt">'+esc(l.t)+'</span>'+
            '<span class="lc">→ '+esc(l.c)+'</span></div>').join("")
        : '<p class="note">まだ遠征記はありません。</p>';
      html = '<h2>遠征記(たどった選択)</h2>'+lines;
    }
    if(kind==="save"){
      const code = S ? makeCode() : "";
      html = '<h2>泥板記録(セーブ)</h2>'+
        '<p class="note">下のコードを控えれば、あとで同じ場所から再開できます。'+
        '(ブラウザには保存されません)</p>'+
        '<textarea class="save-area" id="saveOut" readonly>'+esc(code)+'</textarea>'+
        '<div class="btnrow"><button class="btn" id="copyCode"'+(S?"":" disabled")+'>コードを写す</button></div>'+
        '<p class="note" style="margin-top:18px">再開するには、控えたコードを貼り付けてください。</p>'+
        '<textarea class="save-area" id="saveIn" placeholder="ここにコードを貼り付け"></textarea>'+
        '<div class="btnrow"><button class="btn" id="loadCode">この記録から再開</button></div>'+
        '<div class="save-msg" id="saveMsg"></div>';
    }
    modalBox.innerHTML = html + '<div class="close-row"><button class="btn secondary" id="mClose">閉じる</button></div>';
    $("mClose").onclick = closeModal;
    if(kind==="save"){
      const msg = $("saveMsg");
      $("copyCode") && ($("copyCode").onclick = ()=>{
        const ta=$("saveOut"); ta.select();
        try{ navigator.clipboard ? navigator.clipboard.writeText(ta.value) : document.execCommand("copy");
          msg.textContent="写しました。安全な場所に控えてください。"; }
        catch(e){ msg.textContent="全選択されています。手動でコピーしてください。"; }
      });
      $("loadCode").onclick = ()=>{
        const v=$("saveIn").value.trim();
        if(!v){ msg.textContent="コードが空です。"; return; }
        try{ loadCode(v); closeModal(); }
        catch(e){ msg.textContent="コードを読み取れませんでした。写し間違いがないか確認を。"; }
      };
    }
    modalBg.classList.add("open");
  }

  function makeCode(){
    const p = { v:2, node:S.node, hp:S.hp, mud:S.mud, items:[...S.items],
      flags:[...S.flags], visited:[...S.visited], endings:[...achieved], log:S.log.slice(-60) };
    return btoa(unescape(encodeURIComponent(JSON.stringify(p))));
  }
  function loadCode(code){
    const p = JSON.parse(decodeURIComponent(escape(atob(code))));
    if(p.v!==2 || !STORY.nodes[p.node]) throw new Error("bad");
    S = freshState();
    S.node=p.node; S.hp=p.hp|0; S.mud=p.mud|0;
    S.items=new Map(p.items||[]); S.flags=new Set(p.flags||[]);
    S.visited=new Set(p.visited||[]); S.log=p.log||[];
    achieved = new Set(p.endings||[]);
    undoStack = [];
    render();
    toast("泥板記録から再開しました");
  }

  // ---------- トースト ----------
  function toast(text, cls){
    const box=$("toasts");
    const el=document.createElement("div");
    el.className="toast"+(cls?" "+cls:""); el.textContent=text;
    box.appendChild(el);
    requestAnimationFrame(()=>el.classList.add("show"));
    setTimeout(()=>{ el.classList.remove("show"); setTimeout(()=>el.remove(),400); }, 2200);
  }

  // ---------- 入力 ----------
  $("btnUndo").onclick = undo;
  $("btnGloss").onclick = ()=>openModal("gloss");
  $("btnItems").onclick = ()=>openModal("items");
  $("btnAchv").onclick = ()=>openModal("achv");
  $("btnLog").onclick = ()=>openModal("log");
  $("btnSave").onclick = ()=>openModal("save");
  $("btnTitle").onclick = ()=>{ S=null; undoStack=[]; render(); };
  $("btnDrink").onclick = drink;
  document.addEventListener("keydown", e=>{
    if(modalBg.classList.contains("open")){ if(e.key==="Escape") closeModal(); return; }
    if(!S) return;
    if(e.key>="1" && e.key<="9"){
      const btn=document.querySelector('.choice[data-key="'+e.key+'"]');
      if(btn) btn.click();
    }
  });

  render();
})();
</script>
</body>
</html>
